name = "edgerouteai-billing"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"
# Production values are set via `wrangler secret put` on deploy. See HANDOFF.md.

[[d1_databases]]
binding = "DB"
database_name = "edgerouteai-db"
database_id = "5e45ce25-8ee8-4f0b-9a27-e51b89473ccd"
migrations_dir = "../../packages/db/src/migrations"

# Public URL will be https://billing.edgerouteai.com (route configured in
# Cloudflare dashboard on deploy; DNS step is in HANDOFF.md).
